# Project pattern/格局/夹宫 rule corpus.
#
# These rules are **not** sourced from a cited 《紫微斗数全书》 passage. They are
# structured claims derived from chart structures the project models directly
# (e.g. 夹宫 shapes detected by `core::pattern`), so they carry
# `work = "iztro_pattern_catalog"` and project-owned `source_id`s
# (`pattern.*`), not QuanShu source ids. They are therefore not tracked by the
# QuanShu source inventory under `rule-corpus/quan-shu/source/`.
#
# This file is loaded at runtime alongside `rule-corpus/quan-shu/rules.toml`
# (see `crates/iztro/src/rules/classical/corpus.rs`); both feed the same
# classical rule evaluation. Field semantics match the QuanShu corpus; see
# `docs/zh-CN/rules/quan-shu-corpus.md`.

[[rule]]
id = "life.yang_tuo_clamp_life.constraint_damage"
source_id = "pattern.yang_tuo_jia_ming"
source_clause_id = "yang_tuo_jia_ming"
work = "iztro_pattern_catalog"
source_text_zh_hans = "羊陀夹命，为祸不轻"
normalized_note_zh_hans = "此规则为项目 pattern/夹宫规则目录中的结构化判断，不作为《紫微斗数全书》出处条目处理。擎羊与陀罗分居命宫两邻宫相夹，主牵制、压力与损伤之象。此处所夹为命宫，区别于羊陀夹忌（夹化忌星）。"
status = "executable"

[rule.claim]
domain = "life"
themes = ["constraint", "damage", "work_pressure"]
polarity = "negative"
base_strength = 0.65
claim_key = "claim.life.yang-tuo-clamp-life.constraint-damage"

[[rule]]
id = "life.chang_qu_clamp_life.literary_reputation"
source_id = "pattern.chang_qu_jia_ming"
source_clause_id = "chang_qu_jia_ming"
work = "iztro_pattern_catalog"
source_text_zh_hans = "昌曲夹命，主贵显"
normalized_note_zh_hans = "此规则为项目 pattern/夹宫规则目录中的结构化判断，不作为《紫微斗数全书》出处条目处理。文昌与文曲分居命宫两邻宫相夹，主文才、声名与贵显之象。此规则产出结构化判断（Claim），区别于仅作格局识别的 PatternDetection。"
status = "executable"

[rule.claim]
domain = "life"
themes = ["literary_talent", "reputation", "nobleman_support"]
polarity = "positive"
base_strength = 0.60
claim_key = "claim.life.chang-qu-clamp-life.literary-reputation"
