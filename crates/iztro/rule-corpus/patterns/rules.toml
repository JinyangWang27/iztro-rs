# Project-owned pattern-derived classical rule corpus.
#
# This file contains **project-owned** pattern-derived classical rule metadata
# only:
#
# - `work = "iztro_pattern_catalog"`;
# - project-owned `source_id = "pattern.*"`.
#
# A 格局/pattern has exactly one canonical runtime identity: `PatternId`, detected
# by `core::pattern`. QuanShu Volume 1 pattern catalogue entries are ancient
# source provenance for those canonical patterns; they are tracked separately as
# source inventory (`rule-corpus/quan-shu/source/volume-01.toml`) and can be
# attached to a canonical `PatternId` via `core::pattern::metadata`. They do NOT
# create separate classical runtime rules here.
#
# This file is loaded at runtime alongside `rule-corpus/quan-shu/rules.toml`
# (see `crates/iztro/src/rules/classical/corpus.rs`); both feed the same
# classical rule evaluation. Field semantics match the QuanShu corpus; see
# `docs/zh-CN/rules/quan-shu-corpus.md`.

[[rule]]
id = "life.yang_tuo_clamp_life.constraint_damage"
source_id = "pattern.yang_tuo_jia_ming"
source_clause_id = "yang_tuo_jia_ming"
work = "iztro_pattern_catalog"
source_text_zh_hans = "羊陀夹命，为祸不轻"
normalized_note_zh_hans = "此规则为项目 pattern/夹宫规则目录中的结构化判断，不作为《紫微斗数全书》出处条目处理。擎羊与陀罗分居命宫两邻宫相夹，主牵制、压力与损伤之象。此处所夹为命宫，区别于羊陀夹忌（夹化忌星）。"
status = "executable"

[rule.claim]
domain = "life"
themes = ["constraint", "damage", "work_pressure"]
polarity = "negative"
base_strength = 0.65
claim_key = "claim.life.yang-tuo-clamp-life.constraint-damage"

