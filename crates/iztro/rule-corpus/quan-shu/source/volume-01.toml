source_text_zh_hans = "财印夹禄 禄守命梁相来夹是也，入财亦然"

[[source_group.item]]
key = "lu_ma_pei_yin"
source_order = 8
source_text_zh_hans = "禄马佩印 马前有禄印星同宫是也"

[[source_group.item]]
key = "zuo_gui_xiang_gui"
source_order = 9
source_text_zh_hans = "坐贵向贵 谓魁钺在命迭相坐拱是也"

[[source_group.item]]
key = "ma_tou_dai_jian"
source_order = 10
source_text_zh_hans = "马头带剑 谓马有刃是也不是居午格"

[[source_group.item]]
key = "qi_sha_chao_dou"
source_order = 11
source_text_zh_hans = "七杀朝斗 见前批注"

[[source_group.item]]
key = "ri_yue_bing_ming"
source_order = 12
source_text_zh_hans = "日月并明 见前批注"

[[source_group.item]]
key = "ming_zhu_chu_hai"
source_order = 13
source_text_zh_hans = "明珠出海 见前批注"

[[source_group.item]]
key = "ri_yue_tong_lin"
source_order = 14
source_text_zh_hans = "日月同临 见前批注"

[[source_group.item]]
key = "xing_qiu_jia_yin"
source_order = 15
source_text_zh_hans = "刑囚夹印 天刑廉贞同临身命主武勇之人"

[[source_group.item]]
key = "ke_quan_lu_gong"
source_order = 16
source_text_zh_hans = "科权禄拱 见前批注"

[[source_group.item]]
key = "tan_huo_xiang_feng"
source_order = 17
source_text_zh_hans = "贪火相逢 谓二星守命同居庙旺是也"

[[source_group.item]]
key = "wu_qu_shou_yuan"
source_order = 18
source_text_zh_hans = "武曲守垣 武守命卯宫是也，余不是"

[[source_group.item]]
key = "fu_xiang_chao_yuan"
source_order = 19
source_text_zh_hans = "府相朝垣 见前批注"

[[source_group.item]]
key = "zi_fu_chao_yuan"
source_order = 20
source_text_zh_hans = "紫府朝垣 见前批注"

[[source_group.item]]
key = "wen_xing_an_gong"
source_order = 21
source_text_zh_hans = "文星暗拱 见前批注"

[[source_group.item]]
key = "quan_lu_sheng_feng"
source_order = 22
source_text_zh_hans = "权禄生逢 二星守命庙旺是也，陷不是"

[[source_group.item]]
key = "yang_ren_ru_miao"
source_order = 23
source_text_zh_hans = "羊刃入庙 辰戍丑未守命遇吉是也"

[[source_group.item]]
key = "ju_ji_ju_mao"
source_order = 24
source_text_zh_hans = "巨机居卯 见前批注"

[[source_group.item]]
key = "ming_lu_an_lu"
source_order = 25
source_text_zh_hans = "明禄暗禄 见前批注"

[[source_group.item]]
key = "ke_ming_an_lu"
source_order = 26
source_text_zh_hans = "科明暗禄 见前批注"

[[source_group.item]]
key = "jin_yu_fu_jia"
source_order = 27
source_text_zh_hans = "金舆扶驾 紫微守命前后有日月来夹是也"

