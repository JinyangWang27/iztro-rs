[[source_group.item]]
key = "feng_yun_ji_hui"
source_order = 1
source_text_zh_hans = "风云际会 身命虽弱二限逢禄马是也"

[[source_group.item]]
key = "jin_shang_tian_hua"
source_order = 2
source_text_zh_hans = "锦上添花 谓限破恶星而行吉地是也"

[[source_group.item]]
key = "lu_shuai_ma_kun"
source_order = 3
source_text_zh_hans = "禄衰马困 限逢七杀禄马空亡是也"

[[source_group.item]]
key = "yi_jin_huan_xiang"
source_order = 4
source_text_zh_hans = "衣锦还乡 少年不遂四十后行墓运是也"

[[source_group.item]]
key = "bu_shu_wu_yi"
source_order = 5
source_text_zh_hans = "步数无依 前限接后限连绵不分是也"

[[source_group.item]]
key = "shui_shang_jia_xing"
source_order = 6
source_text_zh_hans = "水上驾星 一年好一年不好是也"

[[source_group.item]]
key = "ji_xiong_xiang_ban"
source_order = 7
source_text_zh_hans = "吉凶相伴 命有主星限前则发限衰不发是也"

[[source_group.item]]
key = "ku_mu_feng_chun"
source_order = 8
source_text_zh_hans = "枯木逢春 谓命衰限好是也"
