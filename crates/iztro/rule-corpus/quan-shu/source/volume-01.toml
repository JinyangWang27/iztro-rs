[[source_group.item]]
key = "sheng_bu_feng_shi"
source_order = 1
source_text_zh_hans = "生不逢时 命坐空亡逢廉贞是也"

[[source_group.item]]
key = "lu_feng_liang_sha"
source_order = 2
source_text_zh_hans = "禄逢两杀 禄坐空亡又逢空劫杀星是也"

[[source_group.item]]
key = "ma_luo_kong_wang"
source_order = 3
source_text_zh_hans = "马落空亡 马既落亡虽禄冲会无用主奔波"

[[source_group.item]]
key = "ri_yue_cang_hui"
source_order = 4
source_text_zh_hans = "日月藏辉 日月反背又逢巨暗是也"

[[source_group.item]]
key = "cai_yu_qiu_chou"
source_order = 5
source_text_zh_hans = "财与囚仇 武贞同守身命是也"

[[source_group.item]]
key = "yi_sheng_gu_pin"
source_order = 6
source_text_zh_hans = "一生孤贫 谓破守命星陷地是也"

[[source_group.item]]
key = "jun_zi_zai_ye"
source_order = 7
source_text_zh_hans = "君子在野 谓四杀守身命而言临陷地是也"

[[source_group.item]]
key = "liang_chong_hua_gai"
source_order = 8
source_text_zh_hans = "两重华盖 谓禄存化禄坐命遇空劫是也"

