# 《紫微斗数全书》 source inventory — Volume 1 pilot slice.
#
# This file tracks rule-candidate source items from volume-01.md, preserving
# source order. It does not duplicate explanatory/commentary prose; raw full
# text remains in docs/zh-CN/sources/quan_shu/volume-01.md.
#
# Structure (see docs/zh-CN/sources/quan_shu/README.md):
#
#   source item = a source passage / location (identified by `source_id`)
#   clause      = an individual candidate rule phrase inside that passage
#                 (identified by `clause_id`, unique within the source item)
#   rule        = an executable/normalized interpretation linked from a clause
#                 via `linked_rule_ids`
#
# So `source_id` identifies the passage, not the semantic rule phrase. One passage
# may contain several clauses, and each clause may link zero or more rules.
#
# ORDERING CONTRACT:
# Source items in this file follow the rule-candidate order of
# docs/zh-CN/sources/quan_shu/volume-01.md. The numeric suffix of source_id is
# source-order based. Inserting earlier source passages requires renumbering
# affected source_id references.
#
# This is a source inventory, not executable rule metadata. Nothing in `src/`
# parses it; it is validated by tests only (see
# crates/iztro/tests/classical_source_inventory.rs). It records only genuine
# QuanShu passages. The `section = "待校"` / `anchor = "TODO"` placeholders are
# reserved for passages believed to be from QuanShu but not yet located in the
# Markdown volumes; none are present in this slice. Rules derived from modeled
# chart structures rather than a cited QuanShu passage (e.g. 羊陀夹命, 昌曲夹命)
# live in rule-corpus/patterns/, not here.

