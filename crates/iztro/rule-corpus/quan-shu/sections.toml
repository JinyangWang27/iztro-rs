# Runtime section-metadata table (卷/节) for QuanShu source-id prefixes.
#
# This is the ONLY source-inventory data loaded at runtime (embedded via
# `include_str!` in `src/rules/source.rs`). The full inventory under
# `source/volume-*.toml` — items, governance status, categories, rule links —
# remains test-only corpus-management data.
#
# One entry per `[[source_group]]` in the inventory. A source id resolves to
# its entry by truncating after the final `.` (item keys never contain dots).
# Kept in sync with the inventory by `tests/source_sections.rs`, which also
# enforces the two invariants that keep this table lean: the inventory
# `anchor` always equals `section`, and `doc_path` is always derivable as
# `docs/zh-CN/sources/quan_shu/volume-{volume:02}.md`.

