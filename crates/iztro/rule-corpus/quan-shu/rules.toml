work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "星临庙旺，再观生克之机"
normalized_note_zh_hans = "方法论指引：星入庙旺后仍须参看五行生克，非单一应验断语。亮度（庙旺）已建模，但五行生克之机尚未建模，且本句不产出确定判断，故标为歧义。"
status = "ambiguous"

[[rule]]
