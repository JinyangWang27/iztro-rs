normalized_note_zh_hans = "方法论指引：命坐强宫仍须细察五行制化之理，非单一应验断语。五行制化尚未建模，且本句不产出确定判断，故标为歧义。"
status = "ambiguous"

[[rule]]
id = "fortune.tang_ju_kong_wang.gain_loss_critical"
source_id = "quan_shu.v01.tai_wei_fu.tang_ju_kong_wang"
