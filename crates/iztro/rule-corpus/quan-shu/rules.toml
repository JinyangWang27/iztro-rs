work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "若逢败地，扶持大有奇功"
normalized_note_zh_hans = "句意结构：落于败地若得吉星或贵人扶持，反有奇功。败地（十二长生）与『扶持』的聚合尚未建模，故暂不可执行。"
