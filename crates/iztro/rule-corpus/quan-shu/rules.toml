# 《紫微斗数全书》 classical rule corpus — pilot slice.
#
# This file is the **authoring source** for classical rule metadata. It is
# Chinese-first: `source_text_zh_hans` preserves the canonical classical text and
# is the source of truth for terminology. Machine logic keys off the stable `id`
# and the typed enum values (see `crates/iztro/src/rules/classical/`).
#
# Enum values use the crate-wide `snake_case` serde convention (the same casing
# every other enum in `iztro` serializes with), so authored TOML and exported JSON
# share one casing. See `docs/en/rules/rule-engine.md` and
# `docs/zh-CN/rules/quan-shu-corpus.md`.
#
# JSON is an export format only; it is never authored here.

[[rule]]
id = "migration.tian_ma_void.restless_movement"
source_id = "quan_shu.v01.tai_wei_fu.ma_yu_kong_wang"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "马遇空亡，终身奔走"
normalized_note_zh_hans = "天马受空亡影响，主奔波迁动之象。空亡仅取已建模的旬空、空亡、截路、截空等星，由 VoidPolicy 明确界定，天空、地空、地劫不在此列。"
status = "executable"

[rule.claim]
domain = "migration"
themes = ["restless_movement", "instability"]
polarity = "mixed_negative"
base_strength = 0.60
claim_key = "claim.migration.tian-ma-void.restless-movement"

[[rule]]
id = "fortune.lu_ma_jiao_chi.favorable_convergence"
source_id = "quan_shu.v01.tai_wei_fu.lu_ma_jiao_chi"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "禄马最喜交驰"
normalized_note_zh_hans = "《太微赋》原文为“日月最嫌反背，禄马最喜交驰”。本规则仅记录禄马交驰为有利组合；“发财远方”不见于当前 QuanShu source item，不作为本规则 source_text 或 ClaimSpec。禄马关系及其具体解释范围尚未建模，故暂不可执行。"
status = "normalized"

[[rule]]
id = "life.ri_yue_fan_bei.hardship_pressure"
source_id = "quan_shu.v01.tai_wei_fu.ri_yue_fan_bei"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "日月最嫌反背"
normalized_note_zh_hans = "太阳与太阴俱处失辉之地（不/陷），主劳碌辛苦、光明不足之象。复用既有日月反背亮度判定，产出带证据的结构化判断。"
status = "executable"

[rule.claim]
domain = "life"
themes = ["work_pressure", "instability"]
polarity = "negative"
base_strength = 0.55
claim_key = "claim.life.ri-yue-fan-bei.hardship-pressure"

# --- 太微赋规范化补全（normalization map）---
# 以下规则把 volume-01.toml 中其余太微赋原子出处单元全部链接到运行时规则元数据。
# 多数为 normalized/ambiguous（尚未建模为可执行谓词），可执行覆盖刻意保守。
# 这些规则均无 [rule.claim]：未实现前不臆测领域/主题/吉凶。

[[rule]]
id = "wealth.lu_feng_chong_po.fortune_undermined"
source_id = "quan_shu.v01.tai_wei_fu.lu_feng_chong_po"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "禄逢冲破，吉处藏凶"
normalized_note_zh_hans = "禄存或化禄逢『冲破』（空亡、煞星冲照等）则吉中藏凶。『冲破』的判定（取空亡、四煞、对宫冲照中的哪些）随流派而异，尚未建模为确定图盘事实，待明确判定口径后再实现。"
status = "ambiguous"

[[rule]]
id = "fortune.sheng_feng_bai_di.illusory_bloom"
source_id = "quan_shu.v01.tai_wei_fu.sheng_feng_bai_di"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "生逢败地，发也虚花"
normalized_note_zh_hans = "句意结构：星曜（或命）落于十二长生之『败（沐浴）』地，则发达虚浮不实。十二长生神尚未建模，故暂不可执行。"
status = "normalized"

[[rule]]
