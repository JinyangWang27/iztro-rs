work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "绝处逢生，生花不败"
normalized_note_zh_hans = "句意结构：落于十二长生之『绝』地却逢『长生』救应，则转危为安、不败。与上句同属十二长生体系，该体系尚未建模，故暂不可执行。"
status = "normalized"

[[rule]]
