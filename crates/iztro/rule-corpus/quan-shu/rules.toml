# 《紫微斗数全书》 classical rule corpus — pilot slice.
#
# This file is the **authoring source** for classical rule metadata. It is
# Chinese-first: `source_text_zh_hans` preserves the canonical classical text and
# is the source of truth for terminology. Machine logic keys off the stable `id`
# and the typed enum values (see `crates/iztro/src/rules/classical/`).
#
# Enum values use the crate-wide `snake_case` serde convention (the same casing
# every other enum in `iztro` serializes with), so authored TOML and exported JSON
# share one casing. See `docs/en/rules/rule-engine.md` and
# `docs/zh-CN/rules/quan-shu-corpus.md`.
#
# JSON is an export format only; it is never authored here.

[[rule]]
id = "migration.tian_ma_void.restless_movement"
source_id = "quan_shu.v01.tai_wei_fu.001"
source_clause_id = "ma_yu_kong_wang"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "马遇空亡，终身奔走"
normalized_note_zh_hans = "天马受空亡影响，主奔波迁动之象。空亡仅取已建模的旬空、空亡、截路、截空等星，由 VoidPolicy 明确界定，天空、地空、地劫不在此列。"
status = "executable"
domain = "migration"
themes = ["restless_movement", "instability"]
polarity = "mixed_negative"
base_strength = 0.60
claim_key = "claim.migration.tian-ma-void.restless-movement"

[[rule]]
id = "wealth.lu_ma_remote_wealth"
source_id = "quan_shu.v01.tai_wei_fu.002"
source_clause_id = "lu_ma_jiao_chi"
work = "zi_wei_dou_shu_quan_shu"
source_text_zh_hans = "禄马交驰，发财远方"
normalized_note_zh_hans = "禄（禄存或化禄）与天马交会驰逐，主远方求财、动中得财之象。禄马“交驰”的具体关系随流派而异，尚未建模为确定的图盘事实，故本规则暂不触发，评估时给出带类型的 Unsupported 诊断。"
status = "normalized"
domain = "wealth"
themes = ["remote_development", "wealth_accumulation", "restless_movement"]
polarity = "positive"
base_strength = 0.55
claim_key = "claim.wealth.lu-ma-remote-wealth"

[[rule]]
