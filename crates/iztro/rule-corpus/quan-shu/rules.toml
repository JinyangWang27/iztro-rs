source_text_zh_hans = "倘居空亡，得失最为要紧"
normalized_note_zh_hans = "句意结构：命或星居空亡之地，得失利害最须权衡。空亡已由 VoidPolicy 建模，但本句仅为『须重点权衡得失』之提示，未给出确定吉凶，故暂不可执行。"
status = "normalized"

[[rule]]
