[workspace]
members = [
    "crates/iztro-cli",
    "crates/iztro-core",
    "crates/iztro-features",
    "crates/iztro-reading",
    "crates/iztro-rules",
]
resolver = "3"

[workspace.package]
authors = ["Jinyang Wang"]
edition = "2024"
license = "MIT"
repository = "https://github.com/JinyangWang27/iztro-rs"
rust-version = "1.85"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
icu_calendar = "2"
lunar-lite = "0.1.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
